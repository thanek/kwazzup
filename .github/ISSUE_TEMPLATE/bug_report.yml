name: Bug report
description: Report a problem with KWazzup
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: KWazzup version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: plasma
    attributes:
      label: KDE Plasma / Qt version
      placeholder: "Plasma 6.x, Qt 6.x"
    validations:
      required: true

  - type: input
    id: distro
    attributes:
      label: Distribution
      placeholder: "e.g. Arch Linux, Kubuntu 24.04"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open KWazzup
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Run `journalctl --user -f` in a terminal and reproduce the issue.
      render: shell
