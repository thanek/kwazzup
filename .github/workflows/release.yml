name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build-deb:
    name: Build TGZ + DEB (Ubuntu 24.04)
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:25.04

    steps:
      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository universe
          apt-get update
          apt-get install -y \
            git \
            cmake \
            ninja-build \
            extra-cmake-modules \
            gettext \
            dpkg-dev \
            libkf6coreaddons-dev \
            libkf6crash-dev \
            libkf6dbusaddons-dev \
            libkf6i18n-dev \
            libkf6widgetsaddons-dev \
            libkf6iconthemes-dev \
            libkf6notifications-dev \
            libkf6configwidgets-dev \
            libkf6config-dev \
            libkf6globalaccel-dev \
            libkf6statusnotifieritem-dev \
            libkf6windowsystem-dev \
            libkf6xmlgui-dev \
            libkf6textwidgets-dev \
            qt6-webengine-dev

      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Package
        run: cd build && cpack -G "TGZ;DEB"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-deb
          path: |
            build/kwazzup-*.tar.gz
            build/kwazzup-*.deb

  build-rpm:
    name: Build RPM (Fedora 42)
    runs-on: ubuntu-24.04
    container:
      image: fedora:42

    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            git \
            cmake \
            ninja-build \
            extra-cmake-modules \
            gettext \
            rpm-build \
            kf6-kcoreaddons-devel \
            kf6-kcrash-devel \
            kf6-kdbusaddons-devel \
            kf6-ki18n-devel \
            kf6-kwidgetsaddons-devel \
            kf6-kiconthemes-devel \
            kf6-knotifications-devel \
            kf6-kconfigwidgets-devel \
            kf6-kconfig-devel \
            kf6-kglobalaccel-devel \
            kf6-kstatusnotifieritem-devel \
            kf6-kwindowsystem-devel \
            kf6-kxmlgui-devel \
            kf6-ktextwidgets-devel \
            qt6-qtwebengine-devel

      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Package
        run: cd build && cpack -G RPM

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-rpm
          path: build/kwazzup-*.rpm

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: [build-deb, build-rpm]

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: packages

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: packages/*
